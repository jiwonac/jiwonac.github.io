---
title: Blog
tags: page
date: 1971-01-01
---

<div class="tile-container">
    {% for post in collections.blog reversed %}
        <div class="tile">
            <a href="{{ post.url }}">
                <img src="{{ post.data.image }}" style="height: 100px; max-width: 50%; object-fit: cover;">
            </a>
            <h3>
                <a href="{{ post.url }}">
                    {{ post.data.title }}
                </a>
            </h3>
            <div class="alignright">
                {{ post.data.date | date: "%b %d, %Y" }}
            </div>
        </div>
    {% endfor %}
</div>
